name = "little-mail"
# name = "mail-exhibit"
main = "src/server.js"
compatibility_date = "2024-01-01"
keep_vars=true

# D1 数据库绑定
[[d1_databases]]
binding = "TEMP_MAIL_DB"
database_name = "maill_free_db" #你的d1数据库名称
database_id = "438096dd-09fb-45a2-9e46-9ff70ec6eae8" # 你的database_id
# 登录会话过期时间（单位：天，默认7天）
# 环境变量
[vars]
# FORWARD_RULES="[{"prefix":"vip","email":"a@example.com"},{"prefix":"*","email":"example@qq.com"}]"
ADMIN_NAME="mailer"
ADMIN_PASSWORD="6XxdTH7GN$2mE4xU"
GUEST_PASSWORD="guest29CD2171-0F72-4E52-BDAE-0D721827DFFB"
JWT_TOKEN="8D05A6A8-49CD-4283-A106-55854CB4DBE0"
JWT_TOKENGUEST_PASSWORD="C5101540-E27C-4BBF-9018-CB2103481872"
SESSION_EXPIRE_DAYS="365"
MAIL_DOMAIN="x.c"
RESEND_API_KEY="xxx"



# 静态资源目录（Workers + Assets）
[assets]
directory = "public"
# 显式指定绑定名，确保在 Worker 中通过 env.ASSETS 可用
binding = "ASSETS"


# R2 存储桶绑定（用于保存完整 EML 内容）
[[r2_buckets]]
binding = "MAIL_EML"
bucket_name = "mail-eml"

# wrangler.toml (wrangler v3.88.0^) 日志服务
